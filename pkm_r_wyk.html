<!DOCTYPE html>
<html lang="pl">
    <link rel="stylesheet" href="css/style.css">
<script src="js/script.js"></script>
<head>
    <meta charset="UTF-8">
    <title>Projekt Biurko</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <h1>Biurko | Inventor</h1>
    <a href="index.html" class="back-btn">← Powrót do CV</a>
</header>

<section class="project-with-video">

    <div class="project-text">
        <h3>System sterowania silnikiem</h3>
        <p>
            Projekt mikrokontrolerowy z regulacją PWM. 
            W tym projekcie zastosowano czujniki prędkości oraz sterowanie PWM do regulacji obrotów silnika. 
            Idealny przykład integracji elektroniki i programowania.
        </p>
        <a href="https://skfb.ly/pH8HC" target="_blank" class="github-link">
            Zobacz na Skertchfab
        </a>
    </div>

<div class="pdf-slider">
    <button id="prev">← Poprzedni</button>
    
    <iframe id="pdf-frame" src="pdf/MCH.02.01.01.pdf" width="800" height="700"></iframe>
    
    <button id="next">Następny →</button>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {
    const pdfFiles = [
        "pdf/MCH.05.01.01.pdf",
        "pdf/MCH.02.01.01.pdf",
        "pdf/MCH.04.01.01.pdf",
        "pdf/MCH.03.01.01.pdf",
        "pdf/MCH.06.01.01.pdf"
    ];

    let current = 0;
    const iframe = document.getElementById("pdf-frame");

    document.getElementById("prev").addEventListener("click", () => {
        current = (current - 1 + pdfFiles.length) % pdfFiles.length;
        iframe.src = pdfFiles[current];
    });

    document.getElementById("next").addEventListener("click", () => {
        current = (current + 1) % pdfFiles.length;
        iframe.src = pdfFiles[current];
    });
});
</script>

</section>
<script src="js/script.js"></script>
</body>
</html>
